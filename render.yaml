# ============================================================
#  render.yaml — Kosmica en Render (CORREGIDO)
#  ✅ FIX: usa DATABASE_URL / DB_USER / DB_PASSWORD para que
#           coincidan con application.properties
# ============================================================

databases:
  - name: kosmica-db
    databaseName: kosmica
    plan: free
    region: oregon

services:

  # ── Backend Java Spring Boot ──────────────────────────────
  - type: web
    name: kosmica-backend
    region: oregon
    plan: free
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # ✅ FIX: ahora se llama DATABASE_URL — coincide con application.properties
      - key: DATABASE_URL
        fromDatabase:
          name: kosmica-db
          property: connectionString   # Render inyecta: postgresql://user:pass@host/db

      # ✅ DB_USER y DB_PASSWORD también deben coincidir
      - key: DB_USER
        fromDatabase:
          name: kosmica-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: kosmica-db
          property: password

      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false

      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false

      - key: WOMPI_PUBLIC_KEY
        sync: false

      - key: WOMPI_PRIVATE_KEY
        sync: false

      - key: WOMPI_EVENTS_SECRET
        sync: false

      - key: STORE_NAME
        value: Kosmica

      - key: STORE_EMAIL
        sync: false

      - key: STORE_URL
        sync: false   # URL del frontend: https://kosmica-frontend.onrender.com

      - key: MAIL_HOST
        value: smtp.gmail.com

      - key: MAIL_PORT
        value: "587"

      - key: MAIL_USER
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      # ✅ Una sola variable — formato: cloudinary://KEY:SECRET@CLOUD_NAME
      - key: CLOUDINARY_URL
        sync: false

      - key: VAPID_PUBLIC_KEY
        sync: false

      - key: VAPID_PRIVATE_KEY
        sync: false

      - key: JWT_SECRET
        sync: false   # Genera uno largo y aleatorio para producción

  # ── Frontend React ────────────────────────────────────────
  - type: web
    name: kosmica-frontend
    region: oregon
    plan: free
    rootDir: frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: kosmica-backend
          type: web
          property: url

      - key: REACT_APP_ADMIN_PASSWORD
        value: Kosmica2025

      - key: REACT_APP_VAPID_PUBLIC_KEY
        sync: false

      - key: REACT_APP_MP_PUBLIC_KEY
        sync: false

      # ⚠️  Esta clave es pública en el bundle de React — considera moverla al backend
      - key: REACT_APP_ANTHROPIC_KEY
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
