# ============================================================
#  render.yaml — Kosmica en Render
#  Sube este archivo a la raíz de tu repo GitHub
#  Render lo detecta y crea todos los servicios automáticamente
# ============================================================

databases:
  - name: kosmica-db
    databaseName: kosmica
    plan: free
    region: oregon

services:

  # ── Backend Java Spring Boot ──────────────────────────────
  - type: web
    name: kosmica-backend
    region: oregon
    plan: free
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kosmica-db
          property: connectionString
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false   # Lo ingresas manualmente en el dashboard
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: STORE_NAME
        value: Kosmica
      - key: STORE_EMAIL
        sync: false
      - key: STORE_URL
        sync: false   # URL del frontend una vez desplegado
      - key: SENDGRID_API_KEY
        sync: false

  # ── Frontend React ────────────────────────────────────────
  - type: web
    name: kosmica-frontend
    region: oregon
    plan: free
    rootDir: frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: kosmica-backend
          type: web
          property: host
      - key: REACT_APP_ADMIN_PASSWORD
        value: Kosmica2025
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
