# ============================================================
#  render.yaml — Kosmica en Render
#  ✅ FIX CRÍTICO: variables BD apuntan a Supabase (sync: false)
#     Configura SPRING_DATASOURCE_URL manualmente en el dashboard
# ============================================================

services:

  # ── Backend Java Spring Boot ──────────────────────────────
  - type: web
    name: kosmica-backend
    region: oregon
    plan: free
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:

      # ════════════════════════════════════════════════════
      #  BASE DE DATOS — Configura manualmente en el dashboard:
      #  SPRING_DATASOURCE_URL  →  jdbc:postgresql://db.XXX.supabase.co:5432/postgres?prepareThreshold=0&sslmode=require
      #  SPRING_DATASOURCE_USERNAME  →  postgres
      #  SPRING_DATASOURCE_PASSWORD  →  tu contraseña de Supabase
      # ════════════════════════════════════════════════════
      - key: SPRING_DATASOURCE_URL
        sync: false

      - key: SPRING_DATASOURCE_USERNAME
        sync: false

      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # ── Tienda ───────────────────────────────────────────
      - key: STORE_NAME
        value: Kosmica

      - key: STORE_EMAIL
        sync: false

      - key: STORE_URL
        sync: false

      # ── Seguridad ────────────────────────────────────────
      - key: JWT_SECRET
        sync: false

      - key: ADMIN_API_KEY
        sync: false

      # FIX CORS: URL del frontend en Render (ej: https://kosmica-frontend.onrender.com)
      # Sin esta variable el panel admin no puede conectarse al backend (CORS bloqueado).
      - key: FRONTEND_URL
        sync: false

      # ── Pasarelas de Pago ────────────────────────────────
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false

      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false

      - key: WOMPI_PUBLIC_KEY
        sync: false

      - key: WOMPI_PRIVATE_KEY
        sync: false

      - key: WOMPI_EVENTS_SECRET
        sync: false

      - key: WOMPI_INTEGRITY_SECRET
        sync: false

      # ── Email ────────────────────────────────────────────
      - key: MAIL_HOST
        value: smtp.gmail.com

      - key: MAIL_PORT
        value: "587"

      - key: MAIL_USER
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      # ── Cloudinary ───────────────────────────────────────
      - key: CLOUDINARY_URL
        sync: false

      # ── Push Notifications (VAPID) ───────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false

      - key: VAPID_PRIVATE_KEY
        sync: false

      # ── AI / Chatbot Isabel ──────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      # ── WhatsApp / CallMeBot ─────────────────────────────
      - key: ADMIN_WHATSAPP
        sync: false

      - key: CALLMEBOT_API_KEY
        sync: false

  # ── Frontend React ────────────────────────────────────────
  - type: web
    name: kosmica-frontend
    region: oregon
    plan: free
    rootDir: frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: kosmica-backend
          type: web
          property: url

      # FIX SEGURIDAD: REACT_APP_ADMIN_PASSWORD eliminado.
      # La autenticación del admin se valida en el backend con ADMIN_API_KEY.
      - key: REACT_APP_VAPID_PUBLIC_KEY
        sync: false

      - key: REACT_APP_MP_PUBLIC_KEY
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
