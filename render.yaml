# ============================================================
#  render.yaml — Kosmica en Render
#  ✅ FIX CRÍTICO: variables de BD corregidas para que coincidan
#     con application.properties (SPRING_DATASOURCE_*)
# ============================================================

databases:
  - name: kosmica-db
    databaseName: kosmica
    plan: free
    region: oregon

services:

  # ── Backend Java Spring Boot ──────────────────────────────
  - type: web
    name: kosmica-backend
    region: oregon
    plan: free
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:

      # ════════════════════════════════════════════════════
      #  BASE DE DATOS
      #  ✅ FIX: nombres corregidos → coinciden exactamente con
      #     application.properties (${SPRING_DATASOURCE_URL}, etc.)
      #
      #  ⚠️  OPCIÓN A — Usando la DB interna de Render:
      #     Descomenta estas 3 líneas y comenta la Opción B.
      #
      #  ⚠️  OPCIÓN B — Usando Supabase externo (más común):
      #     Comenta estas 3 líneas y configura SPRING_DATASOURCE_URL
      #     manualmente en Render → Environment Variables con:
      #     jdbc:postgresql://db.XXX.supabase.co:5432/postgres?prepareThreshold=0&sslmode=require
      # ════════════════════════════════════════════════════

      # OPCIÓN A — DB interna de Render (descomenta si usas esta opción)
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: kosmica-db
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: kosmica-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: kosmica-db
          property: password

      # ── Tienda ───────────────────────────────────────────
      - key: STORE_NAME
        value: Kosmica

      - key: STORE_EMAIL
        sync: false

      - key: STORE_URL
        sync: false   # URL del frontend: https://kosmica-frontend.onrender.com

      # ── Seguridad ────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # Genera con: openssl rand -base64 64

      - key: ADMIN_API_KEY
        sync: false   # Genera con: openssl rand -hex 32

      # ── Pasarelas de Pago ────────────────────────────────
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false

      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false

      - key: WOMPI_PUBLIC_KEY
        sync: false

      - key: WOMPI_PRIVATE_KEY
        sync: false

      - key: WOMPI_EVENTS_SECRET
        sync: false

      - key: WOMPI_INTEGRITY_SECRET
        sync: false   # ✅ Necesaria para firmar el checkout de Wompi

      # ── Email ────────────────────────────────────────────
      - key: MAIL_HOST
        value: smtp.gmail.com

      - key: MAIL_PORT
        value: "587"

      - key: MAIL_USER
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      # ── Cloudinary ───────────────────────────────────────
      - key: CLOUDINARY_URL
        sync: false   # Formato: cloudinary://KEY:SECRET@CLOUD_NAME

      # ── Push Notifications (VAPID) ───────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false

      - key: VAPID_PRIVATE_KEY
        sync: false

      # ── AI / Chatbot Isabel ──────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      # ── WhatsApp / CallMeBot ─────────────────────────────
      - key: ADMIN_WHATSAPP
        sync: false

      - key: CALLMEBOT_API_KEY
        sync: false

  # ── Frontend React ────────────────────────────────────────
  - type: web
    name: kosmica-frontend
    region: oregon
    plan: free
    rootDir: frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: kosmica-backend
          type: web
          property: url

      - key: REACT_APP_ADMIN_PASSWORD
        value: Kosmica2025

      - key: REACT_APP_VAPID_PUBLIC_KEY
        sync: false

      - key: REACT_APP_MP_PUBLIC_KEY
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
