    <!-- ✅ FUENTES: preload + media=print evita bloqueo del render -->

    </noscript>

    <!-- ✅ CSS CRÍTICO INLINE: evita FOUC (flash de contenido sin estilo) -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #FDF8FF; color: #2D1B4E;
        overflow-x: hidden; -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
      /* ✅ SKELETON LOADER — evita pantalla blanca en móvil mientras carga React */
      .app-skeleton {
        min-height: 100vh; background: #FDF8FF;
        display: flex; flex-direction: column;
      }
      .skel-nav {
        height: 58px; background: rgba(155,114,207,.08);
        border-bottom: 1px solid rgba(155,114,207,.15);
      }
      .skel-hero {
        height: 220px; margin: 12px;
        background: linear-gradient(90deg,#f0e8ff 25%,#e8d8ff 50%,#f0e8ff 75%);
        background-size: 200% 100%; border-radius: 16px;
        animation: shimmer 1.4s ease-in-out infinite;
      }
      .skel-row {
        display: flex; gap: 10px; padding: 0 12px; margin-top: 12px;
      }
      .skel-card {
        flex: 1; height: 260px;
        background: linear-gradient(90deg,#f0e8ff 25%,#e8d8ff 50%,#f0e8ff 75%);
        background-size: 200% 100%; border-radius: 12px;
        animation: shimmer 1.4s ease-in-out infinite;
      }
      .skel-card:nth-child(2) { animation-delay: .1s; }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
    </style>
