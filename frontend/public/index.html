<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ VIEWPORT MÓVIL -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="theme-color" content="#9B72CF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ✅ SEO BÁSICO -->
    <title>Kosmica — Moda femenina premium Colombia</title>
    <meta name="description" content="Kosmica — Bolsos, maquillaje, capilar y ropa femenina premium. Envíos a toda Colombia. ¡Compra ahora en kosmica.com.co!" />
    <meta name="keywords" content="moda femenina colombia, bolsos mujer, maquillaje, ropa mujer colombia, capilar, tienda online colombia, kosmica" />
    <meta name="author" content="Kosmica" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.kosmica.com.co/" />

    <!-- ✅ OPEN GRAPH (WhatsApp, Facebook, Instagram, LinkedIn, TikTok) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.kosmica.com.co/" />
    <meta property="og:title" content="Kosmica — Moda femenina premium 💜" />
    <meta property="og:description" content="Bolsos, maquillaje, capilar y ropa femenina premium. Envíos a toda Colombia. ¡Descubre tu estilo en Kosmica!" />
    <meta property="og:image" content="https://www.kosmica.com.co/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kosmica — Moda femenina premium Colombia" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:site_name" content="Kosmica" />

    <!-- ✅ TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kosmica" />
    <meta name="twitter:title" content="Kosmica — Moda femenina premium 💜" />
    <meta name="twitter:description" content="Bolsos, maquillaje, capilar y ropa femenina premium. Envíos a toda Colombia." />
    <meta name="twitter:image" content="https://www.kosmica.com.co/og-image.jpg" />

    <!-- ✅ SCHEMA.ORG (Google entiende mejor tu tienda) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Kosmica",
      "url": "https://www.kosmica.com.co",
      "logo": "https://www.kosmica.com.co/og-image.jpg",
      "description": "Tienda de moda femenina premium en Colombia. Bolsos y morrales , maquillaje, capilar, cuidado personal y accesorios.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CO"
      },
      "sameAs": [
        "https://www.instagram.com/kosmica",
        "https://www.tiktok.com/@kosmica"
      ]
    }
    </script>

    <!-- ✅ FUENTES: preload + media=print evita bloqueo del render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" />
    </noscript>

    <!-- ✅ CSS CRÍTICO INLINE: evita FOUC (flash de contenido sin estilo) -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #FDF8FF; color: #2D1B4E;
        overflow-x: hidden; -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>Necesitas JavaScript para ver esta página.</noscript>
    <div id="root"></div>
  </body>
</html>
