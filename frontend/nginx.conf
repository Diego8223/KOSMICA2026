server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    location /static/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /api/ { proxy_pass http://backend:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /uploads/ { proxy_pass http://backend:8080; }
    location / { try_files $uri $uri/ /index.html; }
}
