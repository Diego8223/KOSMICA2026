# ─── WOMPI ────────────────────────────────────────────────────────────────────
# Clave pública (empieza con pub_prod_...)
wompi.public-key=${WOMPI_PUBLIC_KEY}

# Clave privada (empieza con prv_prod_...)
wompi.private-key=${WOMPI_PRIVATE_KEY}

# ⚠️  IMPORTANTE: Esta es la clave de EVENTOS, no la de integridad del widget.
# Se encuentra en el Dashboard de Wompi > Desarrolladores > Webhooks > "Secreto de eventos"
wompi.events-secret=${WOMPI_EVENTS_SECRET}

# URL base API Wompi producción
wompi.api-url=https://production.wompi.co/v1
