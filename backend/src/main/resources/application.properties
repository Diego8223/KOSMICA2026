# ============================================================
#  application.properties — Kosmica Backend (Render)
# ============================================================
 
# ─── Servidor ──────────────────────────────────────────────
server.port=${PORT:10000}
spring.application.name=kosmica-backend
 
# ─── Arranque rápido ───────────────────────────────────────
spring.main.lazy-initialization=true
spring.jmx.enabled=false
 
# ─── PostgreSQL ────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000
 
# ─── JPA / Hibernate ───────────────────────────────────────
# IMPORTANTE: "none" evita que Hibernate escanee el schema al arrancar
# (era "update" → causaba 60+ segundos de delay)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
 
# ─── Uploads ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=${UPLOAD_DIR:uploads/}
 
# ─── MercadoPago ───────────────────────────────────────────
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:TEST-placeholder}
 
# ─── Tienda ────────────────────────────────────────────────
store.url=${STORE_URL:http://localhost:3000}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}
 
# ─── SendGrid (opcional) ───────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY:}
 
# ─── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null
 
# ─── Logging ───────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
 
groq.api.key=${GROQ_API_KEY:}

 # Push Notifications
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

