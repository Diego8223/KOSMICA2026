# ═══════════════════════════════════════════════════════════════════
#  LuxShop — Configuración de pagos
# ═══════════════════════════════════════════════════════════════════

# ─── Servidor ───────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=luxshop
store.url=${STORE_URL:http://localhost:3000}
store.name=${STORE_NAME:LuxShop}

# ─── Base de datos ──────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER:luxshop}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── MercadoPago ────────────────────────────────────────────────────
#
#  ✅  CHECKOUT PRO (redirect a MercadoPago):
#      Funciona con tokens TEST- (sandbox) y APP_USR- (producción)
#
#  ✅  NEQUI PUSH NOTIFICATION:
#      REQUIERE token de producción formato: APP_USR-XXXXX...
#      El mismo token sirve para ambos — NO se necesita token separado
#      Para obtenerlo: mercadopago.com.co → Tu negocio → Credenciales → Producción
#
#  ⚠️  Con token TEST-... el Nequi push lanzará error de forma intencional
#      (así el frontend cambia automáticamente a MercadoPago como fallback)
#
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:TEST-placeholder}

# ─── Wompi (Bancolombia) ────────────────────────────────────────────
#  Soporta: Nequi, PSE, Tarjetas, Bancolombia, Daviplata, Efecty
#  Credenciales en: comercios.wompi.co → Configuración → Llaves API
wompi.public.key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}
wompi.private.key=${WOMPI_PRIVATE_KEY:prv_test_placeholder}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}

# ─── Email ──────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── JWT / Seguridad ────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:cambiar-en-produccion}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Logs ───────────────────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.com.mercadopago=WARN
