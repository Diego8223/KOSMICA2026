# ============================================================
#  application.properties — Kosmica Backend
# ============================================================

# ─── Servidor ──────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.application.name=kosmica-backend

# ─── MySQL ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/luxshop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Uploads ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/
app.upload.dir=${UPLOAD_DIR:uploads/}

# ─── Stripe ────────────────────────────────────────────────
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}

# ─── SendGrid Email ────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY:}
store.email=${STORE_EMAIL:hola@kosmica.com}
store.name=${STORE_NAME:Kosmica}

# ─── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ─── Logging ───────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN

# ─── Actuator ──────────────────────────────────────────────
management.endpoints.web.base-path=/api
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health
