# ============================================================
#  application.properties — Kosmica Backend (Render)
# ============================================================

# ─── Servidor ──────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=kosmica-backend

# ─── PostgreSQL ────────────────────────────────────────────
# En Render configuras SPRING_DATASOURCE_URL con el formato:
# jdbc:postgresql://HOST:PORT/DATABASE?user=USER&password=PASS&sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Uploads ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ─── MercadoPago ───────────────────────────────────────────
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:TEST-placeholder}

# ─── Tienda ────────────────────────────────────────────────
store.url=${STORE_URL:http://localhost:3000}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# ─── SendGrid (opcional) ───────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY:}

# ─── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ─── Logging ───────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN

groq.api.key=${GROQ_API_KEY:}