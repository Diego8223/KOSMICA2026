# ═══════════════════════════════════════════════════════════════════
#  LuxShop — application.properties (CORREGIDO)
#  ✅ FIX: DATABASE_URL y DB_USER/DB_PASSWORD coinciden con
#          docker-compose.yml (local) y render.yaml (producción)
# ═══════════════════════════════════════════════════════════════════

# ─── Servidor ───────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=luxshop
store.url=${STORE_URL:http://localhost:3000}
store.name=${STORE_NAME:LuxShop}

# ─── Base de datos ──────────────────────────────────────────────────
# ✅ FIX: Antes era ${DATABASE_URL} pero Render inyecta SPRING_DATASOURCE_URL.
#         Ahora se usan dos nombres compatibles con ambos entornos:
#         - Docker local  → DATABASE_URL / DB_USER / DB_PASSWORD  (docker-compose.yml)
#         - Render        → agrega DATABASE_URL en Environment Variables
#                           apuntando a la Internal Connection String de tu DB
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER:luxshop_user}
spring.datasource.password=${DB_PASSWORD:LuxPass2025!}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── HikariCP (pool de conexiones) ──────────────────────────────────
# Evita que Render/Heroku cierren conexiones idle
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.keepalive-time=60000

# ─── MercadoPago ────────────────────────────────────────────────────
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:TEST-placeholder}

# ─── Wompi (Bancolombia) ────────────────────────────────────────────
wompi.public.key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}
wompi.private.key=${WOMPI_PRIVATE_KEY:prv_test_placeholder}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}

# ─── Email ──────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Cloudinary ─────────────────────────────────────────────────────
# ✅ Una sola variable con formato: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
cloudinary.url=${CLOUDINARY_URL:}

# ─── Push Notifications (VAPID) ─────────────────────────────────────
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

# ─── JWT / Seguridad ────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:cambiar-en-produccion}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Logs ───────────────────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.com.mercadopago=WARN
logging.level.com.zaxxer.hikari=WARN
