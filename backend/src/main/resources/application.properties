# ===============================================================
#  Kosmica - application.properties (PRODUCCION)
#  Optimizado para Render + Supabase Transaction Pooler
# ===============================================================

# ---------------------------------------------------------------
# SERVIDOR
# ---------------------------------------------------------------
server.port=${PORT:10000}
spring.application.name=kosmica-backend

# ---------------------------------------------------------------
# NEGOCIO
# ---------------------------------------------------------------
store.url=${STORE_URL:https://www.kosmica.com.co}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# Email secundario del admin (opcional) — recibe copia de cada pedido
admin.email=${ADMIN_EMAIL:}
admin.api.key=${ADMIN_API_KEY:}

# ---------------------------------------------------------------
# CORS
# ---------------------------------------------------------------
cors.extra.origins=https://www.kosmica.com.co,https://kosmica.com.co
frontend.url=${FRONTEND_URL:}

# ---------------------------------------------------------------
# BASE DE DATOS — Supabase Transaction Pooler (puerto 6543)
# ---------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kosmica?prepareThreshold=0&sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=55000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# ---------------------------------------------------------------
# JPA / HIBERNATE
# ---------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ---------------------------------------------------------------
# EMAIL — Gmail SMTP (principal) + SendGrid (fallback)
#
# Variables requeridas en Render → kosmica-backend → Environment:
#   SPRING_MAIL_USERNAME = tiendakosmica@gmail.com
#   SPRING_MAIL_PASSWORD = xxxxxxxxxxxx   ← App Password 16 chars SIN espacios
#
# Cómo generar App Password:
#   1. Activa verificación en 2 pasos en tu cuenta Google
#   2. Ve a https://myaccount.google.com/apppasswords
#   3. Crea una para "Correo > Otro (Kosmica)"
#   4. Copia los 16 caracteres generados (sin espacios)
#
# ⚠️  NO uses tu contraseña normal de Gmail
# ⚠️  Si usas Google Workspace, habilita SMTP en Admin Console
# ---------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# SendGrid (fallback si Gmail falla)
sendgrid.api.key=${SENDGRID_API_KEY:}

# ---------------------------------------------------------------
# PASARELAS DE PAGO
# ---------------------------------------------------------------
wompi.public.key=${WOMPI_PUBLIC_KEY:}
wompi.private.key=${WOMPI_PRIVATE_KEY:}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}
wompi.integrity.secret=${WOMPI_INTEGRITY_SECRET:}

mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:}

# ---------------------------------------------------------------
# NOTIFICACIONES PUSH Y WHATSAPP
# ---------------------------------------------------------------
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
admin.whatsapp=${ADMIN_WHATSAPP:}
callmebot.api.key=${CALLMEBOT_API_KEY:}

# ---------------------------------------------------------------
# CLOUDINARY
# ---------------------------------------------------------------
cloudinary.url=${CLOUDINARY_URL:}
app.upload.dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ---------------------------------------------------------------
# AI / CHATBOTS
# ---------------------------------------------------------------
anthropic.api.key=${ANTHROPIC_API_KEY:}
groq.api.key=${GROQ_API_KEY:}

# ---------------------------------------------------------------
# JACKSON
# ---------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ---------------------------------------------------------------
# SPRING — MISC
# ---------------------------------------------------------------
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# ---------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=INFO
