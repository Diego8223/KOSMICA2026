# ===============================================================
#  Kosmica - application.properties (PRODUCCION)
#  Optimizado para Render + Supabase Transaction Pooler
#  FIX: eliminados bloques duplicados de HikariCP y JPA
# ===============================================================

# --- Servidor y Negocio ---
server.port=${PORT:10000}
spring.application.name=kosmica-backend
store.url=${STORE_URL:https://www.kosmica.com.co}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# --- Base de datos (Supabase Transaction Pooler puerto 6543) ---
#
# FIX 1: Usar el Transaction Pooler (6543), NO la conexion directa (5432).
# FIX 2: sslmode=require es OBLIGATORIO en Supabase.
# FIX 3: prepareThreshold=0 desactiva prepared statements (incompatibles con PgBouncer).
#
# Formato URL para Render:
#   jdbc:postgresql://aws-0-XX.pooler.supabase.com:6543/postgres?prepareThreshold=0&sslmode=require
# Formato USERNAME para Render:
#   postgres.TU_PROJECT_REF   (ej: postgres.abcdefghijklmnop)
#
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kosmica?prepareThreshold=0&sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP (Supabase Transaction Pooler) ---
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=55000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# FIX: desactiva cache de 2do nivel - con PgBouncer en transaction mode las sesiones
#      no son persistentes y el cache puede devolver datos de conexiones ya cerradas.
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# --- Seguridad ---
# FIX: JWT_SECRET comentado - no hay Spring Security implementado.
#      El acceso admin se controla via AdminAuthFilter con ADMIN_API_KEY.
#      Para activar JWT en el futuro: agregar spring-boot-starter-security + jjwt al pom.xml
# app.jwt.secret=${JWT_SECRET}
# app.jwt.expiration=${JWT_EXPIRATION:86400000}
admin.api.key=${ADMIN_API_KEY:}

# --- Pasarelas de Pago ---
wompi.public.key=${WOMPI_PUBLIC_KEY:}
wompi.private.key=${WOMPI_PRIVATE_KEY:}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}
wompi.integrity.secret=${WOMPI_INTEGRITY_SECRET:}

mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:}

# --- Email (SendGrid API) ---
# EmailService llama directamente a la API REST de SendGrid (no usa spring-mail).
# Solo necesitas configurar estas tres variables en Render:
#   SENDGRID_API_KEY  -> clave que empieza con SG. (Settings > API Keys en sendgrid.com)
#   STORE_EMAIL       -> el email verificado como remitente en SendGrid Sender Authentication
#   STORE_NAME        -> nombre que aparece como remitente en los correos
sendgrid.api.key=${SENDGRID_API_KEY:}

# --- AI / Chatbots ---
anthropic.api.key=${ANTHROPIC_API_KEY:}
groq.api.key=${GROQ_API_KEY:}

# --- Cloudinary e Imagenes ---
cloudinary.url=${CLOUDINARY_URL:}
app.upload.dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- Notificaciones push y WhatsApp (CallMeBot) ---
# CallMeBot: whatsapp.php gratuito para enviar mensajes al número admin.
# Pasos para activar:
#   1. Agrega +34 644 59 95 90 a tus contactos
#   2. Envíale: "I allow callmebot to send me messages"
#   3. Recibirás tu CALLMEBOT_API_KEY por respuesta
# ADMIN_WHATSAPP: tu número con código de país sin + (ej: 573043927148)
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
admin.whatsapp=${ADMIN_WHATSAPP:}
callmebot.api.key=${CALLMEBOT_API_KEY:}

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# --- Otros ---
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# --- Logs ---
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=INFO
