# ===============================================================
#  Kosmica - application.properties (PRODUCCION)
#  Optimizado para Render + Supabase Transaction Pooler
# ===============================================================

# --- Servidor y Negocio ---
server.port=${PORT:10000}
spring.application.name=kosmica-backend

store.url=${STORE_URL:https://www.kosmica.com.co}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# ✅ NUEVO: Email secundario del admin para alertas de pedidos (opcional)
# Si se configura, recibirá una copia de cada nuevo pedido
admin.email=${ADMIN_EMAIL:}

# CORS
cors.extra.origins=https://www.kosmica.com.co,https://kosmica.com.co

# --- Base de datos (Supabase Transaction Pooler puerto 6543) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kosmica?prepareThreshold=0&sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP ---
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=55000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# --- Seguridad ---
admin.api.key=${ADMIN_API_KEY:}

# --- Pasarelas de Pago ---
wompi.public.key=${WOMPI_PUBLIC_KEY:}
wompi.private.key=${WOMPI_PRIVATE_KEY:}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}
wompi.integrity.secret=${WOMPI_INTEGRITY_SECRET:}

mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:}

# --- Email (SendGrid API) --- Fallback si Gmail no está configurado
sendgrid.api.key=${SENDGRID_API_KEY:}

# --- AI / Chatbots ---
anthropic.api.key=${ANTHROPIC_API_KEY:}
groq.api.key=${GROQ_API_KEY:}

# --- Cloudinary ---
cloudinary.url=${CLOUDINARY_URL:}
app.upload.dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- Notificaciones push y WhatsApp ---
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
admin.whatsapp=${ADMIN_WHATSAPP:}
callmebot.api.key=${CALLMEBOT_API_KEY:}

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# --- Otros ---
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# --- Logs ---
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=INFO

# ===============================================================
# ✅ EMAIL VIA GMAIL SMTP
#
# PASO 1: Activa "Verificación en 2 pasos" en tu cuenta Google
# PASO 2: Ve a https://myaccount.google.com/apppasswords
# PASO 3: Crea una contraseña de aplicación (App Password)
#         Selecciona: Correo > Otro (nombre personalizado) > Kosmica
# PASO 4: Copia los 16 caracteres generados
#
# Variables a configurar en Render → kosmica-backend → Environment:
#   MAIL_USER     = hola@kosmica.com   (tu email Gmail)
#   MAIL_PASSWORD = xxxx xxxx xxxx xxxx  (contraseña de aplicación, SIN espacios)
#
# ⚠️ IMPORTANTE: Usar contraseña de APLICACIÓN, no la contraseña normal de Gmail
# ⚠️ Si usas workspace de Google, habilita SMTP en Admin Console
# ===============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# --- CORS Frontend ---
frontend.url=${FRONTEND_URL:}
