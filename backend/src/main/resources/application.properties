# ═══════════════════════════════════════════════════════════════════
#  Kosmica — application.properties
#  ✅ Configurado para Render + Supabase (PostgreSQL externo)
#  🔧 FIXES:
#     - prepareThreshold=0  → resuelve "prepared statement already exists" con Supabase/PgBouncer
#     - Fallbacks seguros en todas las variables críticas
# ═══════════════════════════════════════════════════════════════════

# ─── Servidor ───────────────────────────────────────────────────────
server.port=${PORT:10000}
spring.application.name=kosmica-backend
store.url=${STORE_URL:http://localhost:3000}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# ─── Base de datos (Supabase) ───────────────────────────────────────
# ⚠️  En Render → Environment Variables configura:
#
#   SPRING_DATASOURCE_URL  = jdbc:postgresql://db.XXXX.supabase.co:5432/postgres?sslmode=require&prepareThreshold=0
#   SPRING_DATASOURCE_USERNAME = postgres
#   SPRING_DATASOURCE_PASSWORD = tu-password
#
# El parámetro &prepareThreshold=0 es OBLIGATORIO con Supabase/PgBouncer.
# Sin él obtienes: ERROR: prepared statement "S_1" already exists
#
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kosmica?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP (pool de conexiones) ──────────────────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=60000
# FIX Supabase/PgBouncer: deshabilitar prepared statements a nivel JDBC
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ─── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ─── Arranque rápido ────────────────────────────────────────────────
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# ─── Uploads ────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ─── Wompi (Bancolombia) ────────────────────────────────────────────
# ⚠️  En Render → Environment Variables configura:
#   WOMPI_PUBLIC_KEY    = pub_prod_XXXX  (o pub_test_XXXX para pruebas)
#   WOMPI_PRIVATE_KEY   = prv_prod_XXXX  (o prv_test_XXXX para pruebas)
#   WOMPI_EVENTS_SECRET = el secreto del panel Wompi → Desarrolladores → Eventos
#
wompi.public.key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}
wompi.private.key=${WOMPI_PRIVATE_KEY:prv_test_placeholder}
wompi.events.secret=${WOMPI_EVENTS_SECRET:secret_placeholder}

# ─── MercadoPago ────────────────────────────────────────────────────
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:TEST-placeholder}

# ─── Email ──────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── SendGrid (opcional) ────────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY:}

# ─── Cloudinary ─────────────────────────────────────────────────────
cloudinary.url=${CLOUDINARY_URL:}

# ─── Push Notifications (VAPID) ─────────────────────────────────────
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

# ─── JWT / Seguridad ────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:cambiar-en-produccion}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── WhatsApp / CallMeBot ───────────────────────────────────────────
admin.whatsapp=${ADMIN_WHATSAPP:}
callmebot.api.key=${CALLMEBOT_API_KEY:}

# ─── Groq (IA) ──────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:}

# ─── Jackson ────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ─── Logs ───────────────────────────────────────────────────────────
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
