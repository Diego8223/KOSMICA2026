# ═══════════════════════════════════════════════════════════════════
#  Kosmica — application.properties (PRODUCCIÓN)
#  ✅ Optimizado para Render + Supabase Pooler
# ═══════════════════════════════════════════════════════════════════

# ─── Servidor y Negocio ─────────────────────────────────────────────
server.port=${PORT:10000}
spring.application.name=kosmica-backend
store.url=${STORE_URL:https://www.kosmica.com.co}
store.name=${STORE_NAME:Kosmica}
store.email=${STORE_EMAIL:hola@kosmica.com}

# ─── Base de datos (Supabase Pooler: 5432) ──────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kosmica?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP (FIX Supabase Pooler) ─────────────────────────────────
# minimum-idle=0 → Hikari NO mantiene conexiones abiertas en reposo.
# Esto evita el error "Tenant or user not found" que ocurre cuando
# Supabase cierra conexiones inactivas y Hikari intenta reutilizarlas.
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000

# max-lifetime=120000 → Hikari cierra conexiones a los 2 minutos,
# antes de que Supabase las cierre por inactividad.
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=120000

# keepalive-time=0 → Desactiva el keepalive para evitar que Hikari
# intente mantener vivas conexiones que Supabase ya cerró.
spring.datasource.hikari.keepalive-time=0

# Verificación activa de salud de la conexión antes de usarla
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# Deshabilitar caché de sentencias preparadas (vital para Supabase/PgBouncer)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# ─── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ─── Seguridad y JWT ────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
admin.api.key=${ADMIN_API_KEY:}

# ─── Pasarelas de Pago ──────────────────────────────────────────────
# Wompi (Bancolombia)
wompi.public.key=${WOMPI_PUBLIC_KEY:}
wompi.private.key=${WOMPI_PRIVATE_KEY:}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}
wompi.integrity.secret=${WOMPI_INTEGRITY_SECRET:}

# MercadoPago
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY:}

# ─── Integraciones Externas ─────────────────────────────────────────
# Email (Gmail/SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AI / Chatbots (Isabel)
anthropic.api.key=${ANTHROPIC_API_KEY:}
groq.api.key=${GROQ_API_KEY:}

# Cloudinary e Imágenes
cloudinary.url=${CLOUDINARY_URL:}
app.upload.dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Notificaciones y WhatsApp
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
admin.whatsapp=${ADMIN_WHATSAPP:}
callmebot.api.key=${CALLMEBOT_API_KEY:}

# ─── Configuración JSON / Jackson ───────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ─── Otros ──────────────────────────────────────────────────────────
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# Logs (Silenciar ruidos innecesarios en Render)
logging.level.com.luxshop=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
