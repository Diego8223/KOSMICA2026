# ============================================================
#  docker-compose.yml — Kosmica (LOCAL con PostgreSQL + pgAdmin4)
#  ✅ FIXES:
#     - Credenciales movidas a variables de entorno (.env)
#     - WOMPI_INTEGRITY_SECRET agregado
#     - REACT_APP_ANTHROPIC_KEY removido del frontend (chatbot movido al backend)
#  Uso: cp .env.example .env  →  editar .env  →  docker compose up --build
# ============================================================

services:

  # ── Base de datos PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: kosmica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-luxshop}
      POSTGRES_USER: ${POSTGRES_USER:-luxshop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/luxshop_database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luxshop_user} -d ${POSTGRES_DB:-luxshop}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kosmica-network

  # ── pgAdmin 4 ─────────────────────────────────────────────
  #  Acceso: http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kosmica-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kosmica.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kosmica-network

  # ── Backend Java Spring Boot ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kosmica-backend
    restart: unless-stopped
    environment:
      # ── Base de datos ────────────────────────────────────
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-luxshop}?prepareThreshold=0
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-luxshop_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # ── Servidor ─────────────────────────────────────────
      PORT: 8080
      STORE_URL: ${STORE_URL:-http://localhost:3000}
      STORE_NAME: ${STORE_NAME:-Kosmica}
      STORE_EMAIL: ${STORE_EMAIL:-hola@kosmica.com}

      # ── MercadoPago ──────────────────────────────────────
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-TEST-placeholder}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-TEST-placeholder}

      # ── Wompi (Bancolombia) ──────────────────────────────
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-pub_test_placeholder}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-prv_test_placeholder}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      # ✅ FIX: esta variable faltaba — necesaria para firmar el checkout
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}

      # ── Email ────────────────────────────────────────────
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}

      # ── Cloudinary ───────────────────────────────────────
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}

      # ── JWT ──────────────────────────────────────────────
      # ✅ Generar con: openssl rand -base64 64
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # ── Push Notifications (VAPID) ────────────────────────
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}

      # ── Admin ─────────────────────────────────────────────
      ADMIN_API_KEY: ${ADMIN_API_KEY}

      # ── Groq AI ──────────────────────────────────────────
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # ── Anthropic (chatbot Isabel — ahora en el backend) ──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── WhatsApp / CallMeBot ──────────────────────────────
      ADMIN_WHATSAPP: ${ADMIN_WHATSAPP:-}
      CALLMEBOT_API_KEY: ${CALLMEBOT_API_KEY:-}

    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kosmica-network

  # ── Frontend React ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ✅ FIX: REACT_APP_ANTHROPIC_KEY eliminada — el chatbot ahora va por el backend
        REACT_APP_API_URL: ""
        REACT_APP_ADMIN_PASSWORD: ${REACT_APP_ADMIN_PASSWORD}
        REACT_APP_VAPID_PUBLIC_KEY: ${REACT_APP_VAPID_PUBLIC_KEY:-}
        REACT_APP_MP_PUBLIC_KEY: ${REACT_APP_MP_PUBLIC_KEY:-TEST-placeholder}
    container_name: kosmica-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kosmica-network

# ── Redes ─────────────────────────────────────────────────
networks:
  kosmica-network:
    driver: bridge

# ── Volúmenes persistentes ────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:
  uploads_data:
